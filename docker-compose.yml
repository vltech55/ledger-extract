services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-extract}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-extract}
      POSTGRES_DB: ${POSTGRES_DB:-extract}
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-extract} -d ${POSTGRES_DB:-extract}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-extract}:${POSTGRES_PASSWORD:-extract}@postgres:5432/${POSTGRES_DB:-extract}
      DATABASE_URL_SYNC: postgresql+psycopg://${POSTGRES_USER:-extract}:${POSTGRES_PASSWORD:-extract}@postgres:5432/${POSTGRES_DB:-extract}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads:/app/data/uploads
    command: uvicorn extraction.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-extract}:${POSTGRES_PASSWORD:-extract}@postgres:5432/${POSTGRES_DB:-extract}
      DATABASE_URL_SYNC: postgresql+psycopg://${POSTGRES_USER:-extract}:${POSTGRES_PASSWORD:-extract}@postgres:5432/${POSTGRES_DB:-extract}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads:/app/data/uploads
    command: celery -A extraction.worker.celery_app worker --loglevel=info --concurrency=2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
  uploads:
